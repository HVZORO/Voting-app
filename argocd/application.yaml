apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docker-voting-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/HVZORO/Voting-app.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: voting-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true