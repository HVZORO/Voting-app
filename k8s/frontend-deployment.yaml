apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: voting-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: YOUR_DOCKERHUB_USER/voting-app-frontend:latest
        ports:
        - containerPort: 80